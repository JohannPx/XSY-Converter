name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Script
        run: |
          # Build a single .ps1 with UTF-8 BOM (required by PowerShell 5.1 for accented chars)
          # 1. Write UTF-8 BOM
          printf '\xEF\xBB\xBF' > ./XSY-Converter_latest.ps1

          # 2. Concatenate modules in dependency order, stripping any embedded BOMs
          for f in \
            ./scripts/modules/AppState.ps1 \
            ./scripts/modules/Localization.ps1 \
            ./scripts/modules/XsyParser.ps1 \
            ./scripts/modules/ExportCsv.ps1 \
            ./scripts/modules/ExportEwon.ps1 \
            ./scripts/modules/ExportPcVue.ps1 \
            ./scripts/modules/UIHelpers.ps1 \
            ./scripts/modules/UI.ps1; do
            LC_ALL=C sed '1s/^\xEF\xBB\xBF//' "$f" >> ./XSY-Converter_latest.ps1
          done

          # 3. Append main entry point
          LC_ALL=C sed '1s/^\xEF\xBB\xBF//' ./scripts/XSY-Converter.ps1 >> ./XSY-Converter_latest.ps1

      - name: Load release body template
        id: release_body
        run: |
          # Copy template and replace placeholders with sed (safe for quotes/apostrophes)
          cp .github/release-body.md release_notes.md

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")

          sed -i "s|{{VERSION}}|${{ github.ref_name }}|g" release_notes.md
          sed -i "s|{{DATE}}|$(date +'%Y-%m-%d')|g" release_notes.md
          sed -i "s|{{COMMIT_SHA}}|${{ github.sha }}|g" release_notes.md
          sed -i "s|{{COMMIT_MSG}}|${COMMIT_MSG}|g" release_notes.md

          # Append commits list
          echo "" >> release_notes.md
          echo "## Commits inclus" >> release_notes.md
          git log -10 --pretty=format:"- %s (%h)" >> release_notes.md

          echo "Release notes generated"

      - name: Publish Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Release
          bodyFile: release_notes.md
          artifacts: ./XSY-Converter_latest.ps1
          allowUpdates: true
          removeArtifacts: true
